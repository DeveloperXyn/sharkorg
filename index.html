<body>

        </div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/400" alt="Image 2">

            <a href="https://youtube.com" target="_blank">Visit</a>

    </div>

    <div class="card">
        <img src="images/placeholder.jpg" alt="Image 3">
        <div class="card-content">
            <a href="https://roblox.com" target="_blank">Visit</a>
        </div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/400" alt="Image 4">
        <div class="card-content">
            <a href="Youtube" target="_blank">Visit</a>
        </div>
    </div>   

</div>

<footer>
    <div class="footer-container">
        <p>© 2026 Shark Org. All rights reserved.</p>
        
        <div class="footer-links">
